{% extends "base.html" %}
{% block title %}Registro - Nexus{% endblock %} 

{% block content %}
<div class="auth-container">
    <h1>Crear cuenta</h1>
    <p class="subtitle">Unéte a Nexus chat</p>

    <form method="post">
        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required placeholder="tu_usuario">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="tu_email@example.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>
         <p class="auth-link">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
</div>

{% endblock %}
